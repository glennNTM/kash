services:
  app:
    build:
      context: .
      target: production
    container_name: kash-app-prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
